# Sentinel — SaaS Production Compose File
#
# For YOUR cloud server where you run Sentinel as a subscription service.
# End-users download deploy/selfhosted/docker-compose.yml instead.
#
# Minimum required env vars (set in a .env file or shell):
#   DOMAIN            your public domain, e.g. sentinel-app.com
#   APP_SECRET        random 32+ char string (openssl rand -hex 32)
#   MAILER_DSN        smtp://user:pass@smtp.example.com:587
#   POSTGRES_PASSWORD strong database password
#
# Optional (payment / analytics):
#   STRIPE_SECRET_KEY          sk_live_...
#   STRIPE_PUBLISHABLE_KEY     pk_live_...
#   STRIPE_WEBHOOK_SECRET      whsec_...

services:
  # ========================================
  # Caddy reverse proxy (gateway)
  # Fetches Let's Encrypt certificate automatically for DOMAIN.
  # ========================================
  caddy:
    image: ghcr.io/rchehd/sentinel-caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  # ========================================
  # Symfony API (FrankenPHP) — auto-migrates on startup
  # ========================================
  api:
    image: ghcr.io/rchehd/sentinel-api:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_MODE: saas
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-sentinel}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
      # Required: used for registration confirmation emails and notifications
      MAILER_DSN: ${MAILER_DSN:?MAILER_DSN is required}
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-noreply@sentinel-app.com}
      MAILER_SENDER_NAME: ${MAILER_SENDER_NAME:-Sentinel}
      # CORS: accepts requests from the main domain and any tenant subdomains
      CORS_ALLOW_ORIGIN: "^https://(${DOMAIN:?DOMAIN is required}|[a-z0-9-]+\\.${DOMAIN})$"
      SERVER_NAME: ${SERVER_NAME:-:80}
      FRANKENPHP_CONFIG: "worker ./public/index.php"
      # Stripe (optional — remove if not using payments)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ========================================
  # Messenger Worker (async jobs: emails, webhooks, etc.)
  # ========================================
  worker:
    image: ghcr.io/rchehd/sentinel-api:latest
    restart: unless-stopped
    command: php bin/console messenger:consume async failed --time-limit=3600 --memory-limit=256M -vv
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_MODE: saas
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-sentinel}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
      MAILER_DSN: ${MAILER_DSN:?MAILER_DSN is required}
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-noreply@sentinel-app.com}
      MAILER_SENDER_NAME: ${MAILER_SENDER_NAME:-Sentinel}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

  # ========================================
  # React Frontend
  # ========================================
  web:
    image: ghcr.io/rchehd/sentinel-web:latest
    restart: unless-stopped

  # ========================================
  # PostgreSQL with pgvector
  # ========================================
  database:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Redis (cache + queue)
  # ========================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  database_data:
  redis_data:
