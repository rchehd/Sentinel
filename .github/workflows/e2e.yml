name: E2E Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'app/web/**'
              - 'app/api/**'
              - 'docker/**'
              - 'compose.yml'
              - 'compose.e2e.yml'

  e2e:
    name: Playwright E2E
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add hosts entries
        run: echo "127.0.0.1 sentinel.localhost api.sentinel.localhost" | sudo tee -a /etc/hosts

      - name: Build and start services
        run: docker compose -f compose.yml up -d --build

      - name: Wait for web to be reachable through Caddy
        run: timeout 90 sh -c 'until curl -k -sf https://sentinel.localhost > /dev/null 2>&1; do sleep 3; done'

      - name: Run E2E tests
        run: |
          COMPOSE_PROFILES=e2e docker compose -f compose.yml -f compose.e2e.yml run --rm --no-deps \
            -e CI=true \
            e2e sh -c "npm ci && npx bddgen && npx playwright test"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/web/playwright-report/
          retention-days: 30
